name: Send Tomorrow Weather SMS

on:
  schedule:
    - cron: "57 11 * * *"
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Forecast offset in days (1 = tomorrow, 0 = today)"
        required: true
        default: "0"
      test_mode:
        description: "true/false - send only to the primary test recipient"
        required: true
        default: "false"

jobs:
  send-weather-sms:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: weather-sms

      - name: Run weather SMS script
        run: python weather_sms.py "${{ github.event.inputs.days_ahead || '0' }}"
        working-directory: weather-sms
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
