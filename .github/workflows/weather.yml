name: Send Tomorrow Weather SMS

on:
  schedule:
    - cron: "57 2 * * *"
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Forecast offset in days (1 = tomorrow, 0 = today)"
        required: true
        default: "1"

jobs:
  send-weather-sms:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: weather-sms

      - name: Run weather SMS script
        run: python weather_sms.py "${{ github.event.inputs.days_ahead || '1' }}"
        working-directory: weather-sms
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
